name: Python wheels

on:
  push:
    tags:
      - 'v*'
  pull_request:
    paths:
      - 'crates/stabstream-py/**'
      - 'crates/stabstream-core/**'
      - 'crates/stabstream-decoder/**'
      - 'crates/stabstream-dem/**'
      - 'crates/stabstream-deserialize/**'
      - 'crates/stabstream-validate/**'
      - 'crates/stabstream-metrics/**'
      - '.github/workflows/wheels.yml'
  workflow_dispatch:

jobs:
  linux:
    name: Linux (${{ matrix.target }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        target: [x86_64, aarch64]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: |
            3.9
            3.10
            3.11
            3.12
            3.13
      - name: Build wheels
        uses: PyO3/maturin-action@v1
        with:
          manifest-path: crates/stabstream-py/Cargo.toml
          target: ${{ matrix.target }}
          args: --release --out dist --find-interpreter
          sccache: true
          manylinux: auto
      - uses: actions/upload-artifact@v4
        with:
          name: wheels-linux-${{ matrix.target }}
          path: dist

  windows:
    name: Windows (x64)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: |
            3.9
            3.10
            3.11
            3.12
            3.13
      - name: Build wheels
        uses: PyO3/maturin-action@v1
        with:
          manifest-path: crates/stabstream-py/Cargo.toml
          target: x64
          args: --release --out dist --find-interpreter
          sccache: true
      - uses: actions/upload-artifact@v4
        with:
          name: wheels-windows-x64
          path: dist

  macos-intel:
    name: macOS (x86_64)
    runs-on: macos-13
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: |
            3.9
            3.10
            3.11
            3.12
            3.13
      - name: Build wheels
        uses: PyO3/maturin-action@v1
        with:
          manifest-path: crates/stabstream-py/Cargo.toml
          target: x86_64
          args: --release --out dist --find-interpreter
          sccache: true
      - uses: actions/upload-artifact@v4
        with:
          name: wheels-macos-x86_64
          path: dist

  macos-arm:
    name: macOS (aarch64)
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: |
            3.9
            3.10
            3.11
            3.12
            3.13
      - name: Build wheels
        uses: PyO3/maturin-action@v1
        with:
          manifest-path: crates/stabstream-py/Cargo.toml
          target: aarch64
          args: --release --out dist --find-interpreter
          sccache: true
      - uses: actions/upload-artifact@v4
        with:
          name: wheels-macos-aarch64
          path: dist

  sdist:
    name: Source distribution
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build sdist
        uses: PyO3/maturin-action@v1
        with:
          manifest-path: crates/stabstream-py/Cargo.toml
          command: sdist
          args: --out dist
      - uses: actions/upload-artifact@v4
        with:
          name: wheels-sdist
          path: dist

  publish:
    name: Publish to PyPI
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    needs: [linux, windows, macos-intel, macos-arm, sdist]
    environment:
      name: pypi
      url: https://pypi.org/p/stabstream
    permissions:
      id-token: write  # OIDC trusted publishing — no PYPI_API_TOKEN needed
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: wheels-*
          merge-multiple: true
          path: dist
      - name: Publish to PyPI
        uses: PyO3/maturin-action@v1
        with:
          command: upload
          args: --non-interactive --skip-existing dist/*
