name: Python wheels

on:
  push:
    tags:
      - 'v*'
  pull_request:
    paths:
      - 'crates/stabstream-py/**'
      - 'crates/stabstream-core/**'
      - 'crates/stabstream-decoder/**'
      - 'crates/stabstream-dem/**'
      - 'crates/stabstream-deserialize/**'
      - 'crates/stabstream-validate/**'
      - 'crates/stabstream-metrics/**'
      - '.github/workflows/wheels.yml'
  workflow_dispatch:

jobs:
  linux:
    name: Linux (${{ matrix.target }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - target: x86_64
            # Explicit CPython paths avoid any PyPy bundled in the x86_64 container.
            maturin-args: >-
              --release --out dist
              --interpreter
              /opt/python/cp39-cp39/bin/python3.9
              /opt/python/cp310-cp310/bin/python3.10
              /opt/python/cp311-cp311/bin/python3.11
              /opt/python/cp312-cp312/bin/python3.12
              /opt/python/cp313-cp313/bin/python3.13
            before-script: 'true'
          - target: aarch64
            # Cross-compile: explicit paths fail (aarch64 binaries can't run on
            # the x86_64 host). Use --find-interpreter but strip all PyPy first;
            # PyO3 0.28 dropped support for PyPy <3.11 and we don't ship PyPy wheels.
            maturin-args: --release --out dist --find-interpreter
            before-script: 'rm -rf /opt/python/pp*'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: |
            3.9
            3.10
            3.11
            3.12
            3.13
      - name: Build wheels
        uses: PyO3/maturin-action@v1
        with:
          working-directory: crates/stabstream-py
          target: ${{ matrix.target }}
          args: ${{ matrix.maturin-args }}
          manylinux: auto
          before-script-linux: ${{ matrix.before-script }}
      - uses: actions/upload-artifact@v4
        with:
          name: wheels-linux-${{ matrix.target }}
          path: crates/stabstream-py/dist

  windows:
    name: Windows (x64)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: |
            3.9
            3.10
            3.11
            3.12
            3.13
      - name: Build wheels
        uses: PyO3/maturin-action@v1
        with:
          working-directory: crates/stabstream-py
          target: x64
          args: --release --out dist --find-interpreter
      - uses: actions/upload-artifact@v4
        with:
          name: wheels-windows-x64
          path: crates/stabstream-py/dist

  macos-intel:
    name: macOS (x86_64)
    runs-on: macos-13
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: |
            3.9
            3.10
            3.11
            3.12
            3.13
      - name: Build wheels
        uses: PyO3/maturin-action@v1
        with:
          working-directory: crates/stabstream-py
          target: x86_64
          args: --release --out dist --find-interpreter
      - uses: actions/upload-artifact@v4
        with:
          name: wheels-macos-x86_64
          path: crates/stabstream-py/dist

  macos-arm:
    name: macOS (aarch64)
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: |
            3.9
            3.10
            3.11
            3.12
            3.13
      - name: Build wheels
        uses: PyO3/maturin-action@v1
        with:
          working-directory: crates/stabstream-py
          target: aarch64
          args: --release --out dist --find-interpreter
      - uses: actions/upload-artifact@v4
        with:
          name: wheels-macos-aarch64
          path: crates/stabstream-py/dist

  sdist:
    name: Source distribution
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build sdist
        uses: PyO3/maturin-action@v1
        with:
          command: sdist
          args: --out dist --manifest-path crates/stabstream-py/Cargo.toml
      - uses: actions/upload-artifact@v4
        with:
          name: wheels-sdist
          path: dist

  publish:
    name: Publish to PyPI
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    needs: [linux, windows, macos-intel, macos-arm, sdist]
    environment:
      name: pypi
      url: https://pypi.org/p/stabstream
    permissions:
      id-token: write  # OIDC trusted publishing — no PYPI_API_TOKEN needed
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: wheels-*
          merge-multiple: true
          path: dist
      - name: Publish to PyPI
        uses: PyO3/maturin-action@v1
        with:
          command: upload
          args: --non-interactive --skip-existing dist/*
