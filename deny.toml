[licenses]
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-3.0",
    "Zlib",
    "CC0-1.0",
    "Unlicense",
    "MPL-2.0",
    "BSL-1.0",
]

[advisories]
ignore = [
    # paste crate unmaintained — indirect dep via ratatui, no safe upgrade path
    "RUSTSEC-2024-0375",
    # instant crate unmaintained — indirect dep via criterion
    "RUSTSEC-2024-0436",
    # pyo3 0.28: PyCFunction::new_closure missing Sync bound (RUSTSEC-2026-0176)
    # and related closure thread-safety issue (RUSTSEC-2026-0177) — fixed in
    # pyo3 0.29.0; upgrade tracked in issue #50 scope
    "RUSTSEC-2026-0176",
    "RUSTSEC-2026-0177",
]

[bans]
multiple-versions = "warn"

[sources]
unknown-registry = "deny"
unknown-git = "deny"
