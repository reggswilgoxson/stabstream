[licenses]
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-3.0",
    "Zlib",
    "CC0-1.0",
    "Unlicense",
    "MPL-2.0",
    "BSL-1.0",
]

[advisories]
ignore = [
    # paste crate unmaintained — indirect dep via ratatui, no safe upgrade path
    "RUSTSEC-2024-0375",
    # instant crate unmaintained — indirect dep via criterion
    "RUSTSEC-2024-0436",
    # pyo3 0.21.2 PyString::from_object nul-byte issue — upgrading pyo3 requires
    # breaking API changes to stabstream-py; tracked for future upgrade
    "RUSTSEC-2025-0020",
]

[bans]
multiple-versions = "warn"

[sources]
unknown-registry = "deny"
unknown-git = "deny"
