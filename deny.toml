[licenses]
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-3.0",
    "Unicode-DFL",
    "Zlib",
    "CC0-1.0",
]
# Fail on any dependency with an unlicensed or unrecognized license.
unlicensed = "deny"
copyleft = "warn"

[advisories]
db-path = "~/.cargo/advisory-db"
db-urls = ["https://github.com/rustsec/advisory-db"]
vulnerability = "deny"
unmaintained = "warn"
yanked = "warn"
notice = "warn"

[bans]
# Warn on duplicate versions of the same crate (can't always avoid).
multiple-versions = "warn"

[sources]
unknown-registry = "deny"
unknown-git = "deny"
